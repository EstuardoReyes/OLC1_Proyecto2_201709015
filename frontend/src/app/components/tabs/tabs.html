<div class="flex flex-col bg-[#252526] border-b border-[#2a2a2a] shrink-0">

  <!-- Barra de acciones de archivo -->
  <div class="flex items-center gap-1 px-3 h-10 bg-[#2d2d2d] border-b border-[#3a3a3a]">

    <!-- Botones decorativos de ventana 
    <span class="w-3 h-3 rounded-full bg-[#FF5F57]"></span>
    <span class="w-3 h-3 rounded-full bg-[#FFBD2E]"></span>
    <span class="w-3 h-3 rounded-full bg-[#28C840]"></span>
-->
    <!-- Acciones de archivo -->
    <div class="flex gap-1 ml-3">
      <button
        (click)="newFile()"
        title="Nuevo archivo .gst"
        class="text-[11px] text-[#9e9e9e] hover:text-[#cccccc] px-2 py-1 hover:bg-[#3a3a3a] rounded transition-colors font-sans">
        Nuevo
      </button>
      <button
        (click)="openFile()"
        title="Abrir archivo .gst"
        class="text-[11px] text-[#9e9e9e] hover:text-[#cccccc] px-2 py-1 hover:bg-[#3a3a3a] rounded transition-colors font-sans">
        Abrir
      </button>
      <button
        (click)="saveFile()"
        title="Guardar como .gst"
        class="text-[11px] text-[#9e9e9e] hover:text-[#cccccc] px-2 py-1 hover:bg-[#3a3a3a] rounded transition-colors font-sans">
        Guardar
      </button>
            <button
        (click)="ejecutar()"
        title="Compilar y ejecutar código"
        class="text-[11px] text-[#9e9e9e] hover:text-[#cccccc] px-2 py-1 hover:bg-[#3a3a3a] rounded transition-colors font-sans">
        Ejecutar
      </button>
    </div>

    <!-- Nombre del archivo activo centrado -->
    <span class="flex-1 text-center text-[11px] text-[#555] font-sans">
      {{ fileService.activeFile()?.name }}
    </span>
  </div>

  <!-- Pestañas de archivos -->
  <div class="flex items-stretch h-8 overflow-x-auto pl-1">
    @for (tab of fileService.tabs(); track tab.id) {
      <div
        (click)="switchTab(tab.id)"
        class="flex items-center gap-1.5 px-3 cursor-pointer text-[11px] font-sans border-r border-[#2a2a2a] shrink-0 select-none transition-colors"
        [class.text-[#cccccc]]="isActive(tab.id)"
        [class.text-[#6b6b6b]]="!isActive(tab.id)"
        [class.bg-[#1e1e1e]]="isActive(tab.id)"
        [style.border-bottom]="isActive(tab.id) ? '2px solid #EF9F27' : '2px solid transparent'">

        {{ tab.name }}

        <!-- Botón cerrar (se oculta si solo hay una pestaña) -->
        @if (fileService.tabs().length > 1) {
          <span
            (click)="closeTab($event, tab.id)"
            title="Cerrar pestaña"
            class="flex items-center justify-center w-3.5 h-3.5 rounded text-[#555] hover:text-[#f09595] hover:bg-[#3a1515] transition-colors leading-none">
            ×
          </span>
        }

      </div>
    }
  </div>

</div>
