<div class="flex bg-[#2d2d2d] border-b border-gray-700">

  <div
    *ngFor="let tab of fileService.tabs"
    (click)="fileService.setActiveTab(tab.id)"
    class="px-4 py-2 cursor-pointer text-sm"
    [class.bg-[#1e1e1e]]="tab.id === fileService.activeTab"
  >
    {{ tab.name }}
  </div>

  <button
    (click)="fileService.createFile()"
    class="px-3 text-green-400"
  >
    +
  </button>

</div>
